name: 3-Tier DevOps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: mohit25s
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Backend
    - name: Build Backend Image
      run: |
        docker build -t mohit25s/3tier-backend ./backend

    - name: Push Backend Image
      run: |
        docker push mohit25s/3tier-backend

    # 🔹 Frontend
    - name: Build Frontend Image
      run: |
        docker build -t mohit25s/3tier-frontend ./frontend

    - name: Push Frontend Image
      run: |
        docker push mohit25s/3tier-frontend