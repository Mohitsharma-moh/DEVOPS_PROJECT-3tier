name: 3-Tier DevOps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    # 1. Code checkout
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Docker Hub login
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 3. Backend Image Build & Push
    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/3tier-backend ./backend

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/3tier-backend

    # 🔹 4. Frontend Image Build & Push
    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/3tier-frontend ./frontend

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/3tier-frontend